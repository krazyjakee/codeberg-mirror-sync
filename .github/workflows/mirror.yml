name: Sync GitHub repos to Codeberg

on:
  schedule:
    - cron: '17 4 * * *'   # daily at 04:17 UTC
  workflow_dispatch:        # manual "Run workflow" button

permissions:
  contents: read            # only reads public repo metadata

concurrency:
  group: codeberg-mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
      CODEBERG_OWNER: krazyjakee
      GITHUB_OWNER: krazyjakee
      # Repos always included even if fork/archived:
      EXTRA_REPOS: "godot-mog MoGen DungeonTemplateLibrary-Godot"
    steps:
      - name: Push-mirror GitHub repos to Codeberg
        run: |
          set -euo pipefail
          cbapi="https://codeberg.org/api/v1"
          cbauth="Authorization: token ${CODEBERG_TOKEN}"

          # Eligible: public, non-fork, non-archived repos owned by the user,
          # plus the explicitly requested EXTRA_REPOS.
          mapfile -t repos < <(gh repo list "$GITHUB_OWNER" \
            --source --no-archived --visibility public \
            --limit 1000 --json name -q '.[].name')
          for r in $EXTRA_REPOS; do
            printf '%s\n' "${repos[@]}" | grep -qxF "$r" || repos+=("$r")
          done
          mapfile -t repos < <(printf '%s\n' "${repos[@]}" | sort -u)
          echo "Mirroring ${#repos[@]} repos"

          created=0; pushed=0; failed=0
          work="$(mktemp -d)"

          for name in "${repos[@]}"; do
            echo "::group::$name"

            # 1. Ensure a plain (non-mirror) Codeberg repo exists.
            code=$(curl -sS -o /dev/null -w '%{http_code}' \
              -H "$cbauth" "$cbapi/repos/$CODEBERG_OWNER/$name")
            if [ "$code" = "404" ]; then
              payload=$(jq -nc \
                --arg n "$name" \
                --arg d "Mirror of https://github.com/$GITHUB_OWNER/$name" \
                '{name:$n, private:false, description:$d, auto_init:false}')
              if curl -fsS -o /dev/null -X POST -H "$cbauth" \
                   -H 'Content-Type: application/json' \
                   "$cbapi/user/repos" -d "$payload"; then
                echo "+ created Codeberg repo $name"
                created=$((created+1))
              else
                echo "! failed to create Codeberg repo $name"
                failed=$((failed+1)); echo "::endgroup::"; continue
              fi
            elif [ "$code" != "200" ]; then
              echo "! unexpected Codeberg status $code for $name"
              failed=$((failed+1)); echo "::endgroup::"; continue
            fi

            # 2. Mirror clone from GitHub and push heads+tags to Codeberg.
            src="https://github.com/$GITHUB_OWNER/$name.git"
            dst="https://$CODEBERG_OWNER:$CODEBERG_TOKEN@codeberg.org/$CODEBERG_OWNER/$name.git"
            if git clone --quiet --mirror "$src" "$work/$name.git" \
               && git -C "$work/$name.git" push --quiet --prune "$dst" \
                    '+refs/heads/*:refs/heads/*' '+refs/tags/*:refs/tags/*'; then
              echo "= pushed $name"
              pushed=$((pushed+1))
            else
              echo "! push failed for $name"
              failed=$((failed+1))
            fi
            rm -rf "$work/$name.git"
            echo "::endgroup::"
          done

          rm -rf "$work"
          echo "---"
          echo "created=$created pushed=$pushed failed=$failed"
          [ "$failed" -eq 0 ]
