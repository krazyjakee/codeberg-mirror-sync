name: Sync GitHub repos to Codeberg mirrors

on:
  schedule:
    - cron: '17 4 * * *'   # daily at 04:17 UTC
  workflow_dispatch:        # manual "Run workflow" button

permissions:
  contents: read            # only needs to read public repo metadata

concurrency:
  group: codeberg-mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
      CODEBERG_OWNER: krazyjakee
      GITHUB_OWNER: krazyjakee
      MIRROR_INTERVAL: 8h
    steps:
      - name: Provision Codeberg pull-mirrors
        run: |
          set -euo pipefail
          api="https://codeberg.org/api/v1"
          auth="Authorization: token ${CODEBERG_TOKEN}"

          # Eligible: public, non-fork, non-archived repos owned by the user.
          mapfile -t repos < <(gh repo list "$GITHUB_OWNER" \
            --source --no-archived --visibility public \
            --limit 1000 --json name -q '.[].name' | sort)

          echo "Found ${#repos[@]} eligible GitHub repos"
          created=0; synced=0; skipped=0

          for name in "${repos[@]}"; do
            code=$(curl -fsS -o /dev/null -w '%{http_code}' \
              -H "$auth" "$api/repos/$CODEBERG_OWNER/$name" || echo 000)

            case "$code" in
              200)
                # Already on Codeberg — ask it to pull from GitHub now.
                if curl -fsS -X POST -H "$auth" \
                     "$api/repos/$CODEBERG_OWNER/$name/mirror-sync" >/dev/null 2>&1; then
                  echo "= $name: mirror-sync triggered"
                  synced=$((synced+1))
                else
                  echo "= $name: exists but not a mirror (or no perm) — leaving alone"
                  skipped=$((skipped+1))
                fi
                ;;
              404)
                payload=$(jq -nc \
                  --arg clone "https://github.com/$GITHUB_OWNER/$name.git" \
                  --arg name  "$name" \
                  --arg iv    "$MIRROR_INTERVAL" \
                  --arg desc  "Mirror of https://github.com/$GITHUB_OWNER/$name" \
                  '{clone_addr:$clone, repo_name:$name, service:"github",
                    mirror:true, mirror_interval:$iv, private:false,
                    wiki:false, description:$desc}')
                if curl -fsS -X POST -H "$auth" -H 'Content-Type: application/json' \
                     "$api/repos/migrate" -d "$payload" >/dev/null; then
                  echo "+ $name: Codeberg pull-mirror created"
                  created=$((created+1))
                else
                  echo "! $name: migrate call failed"
                  skipped=$((skipped+1))
                fi
                ;;
              *)
                echo "! $name: unexpected Codeberg status $code — skipping"
                skipped=$((skipped+1))
                ;;
            esac
          done

          echo "---"
          echo "created=$created synced=$synced skipped=$skipped"
